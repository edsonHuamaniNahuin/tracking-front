# netlify.toml — Configuración de despliegue para tracking-front
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Variables de entorno requeridas en Netlify Dashboard:
  # Site → Environment variables → agregar todas las siguientes:
  #
  # VITE_API_URL          = https://api.nautic.run/api/v1
  #
  # VITE_REVERB_APP_KEY   = <valor de REVERB_APP_KEY en el .env del backend>
  # VITE_REVERB_HOST      = api.nautic.run
  # VITE_REVERB_PORT      = 443
  # VITE_REVERB_SCHEME    = https
  #
  # Las vars VITE_REVERB_* son necesarias para el modo Live (WebSocket).
  # Sin ellas el modo Live queda inactivo pero el resto de la app funciona.

# ── Seguridad: cabeceras globales ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── SPA routing: todas las rutas van a index.html ────────────────────────────
# Necesario para que React Router funcione al recargar o acceder directamente.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
