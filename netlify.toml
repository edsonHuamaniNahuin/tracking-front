# netlify.toml — Configuración de despliegue para tracking-front
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # IMPORTANTE: Define VITE_API_URL en el dashboard de Netlify
  # Site → Environment variables → VITE_API_URL = https://tracking-api.onrender.com/api/v1

# ── Seguridad: cabeceras globales ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── SPA routing: todas las rutas van a index.html ────────────────────────────
# Necesario para que React Router funcione al recargar o acceder directamente.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
